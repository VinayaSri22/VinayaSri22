name: GitHub Profile OS

on:
  schedule:
    # 06:30 IST (01:00 UTC) every morning. Adjust to your timezone.
    - cron: "0 1 * * *"
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - "update.py"
      - "config.json"
      - ".github/workflows/update.yml"

permissions:
  contents: write

concurrency:
  group: profile-os
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build profile (stdlib only, no dependencies)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/
          if git diff --staged --quiet; then
            echo "Nothing changed."
          else
            git commit -m "chore: rebuild profile dashboard [skip ci]"
            git push
          fi
